<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  :root {
    /* __DESIGN_TOKENS__ */
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 627px;
    overflow: hidden;
    font-family: var(--font-body);
    background: var(--brand-bg);
    color: var(--brand-text);
    display: flex;
    flex-direction: column;
    padding: calc(44px * var(--spacing-unit)) calc(56px * var(--spacing-unit));
    position: relative;
  }
  /* Bottom accent bar */
  body::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 6px;
    background: linear-gradient(90deg, var(--brand-primary), var(--brand-accent), var(--brand-secondary));
  }
  .top-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: calc(24px * var(--spacing-unit));
  }
  .logo {
    width: 44px;
    height: 44px;
    object-fit: contain;
    border-radius: var(--radius-sm);
  }
  .hook {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--brand-primary);
    background: color-mix(in srgb, var(--brand-primary) 8%, transparent);
    padding: 6px 16px;
    border-radius: var(--radius-sm);
  }
  .headline {
    font-family: var(--font-heading);
    font-size: 42px;
    font-weight: 800;
    line-height: 1.12;
    color: var(--brand-primary);
    margin-bottom: calc(14px * var(--spacing-unit));
  }
  .accent-line {
    width: 64px;
    height: 3px;
    background: linear-gradient(90deg, var(--brand-accent), color-mix(in srgb, var(--brand-accent) 30%, transparent));
    border-radius: 2px;
    margin-bottom: calc(18px * var(--spacing-unit));
  }
  .body-text {
    font-size: 20px;
    line-height: 1.65;
    color: color-mix(in srgb, var(--brand-text) 70%, transparent);
    flex: 1;
  }
  .bottom-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: auto;
    padding-top: calc(20px * var(--spacing-unit));
    border-top: var(--border-width) solid color-mix(in srgb, var(--brand-text) 10%, transparent);
  }
  .subheadline {
    font-size: 17px;
    font-weight: 600;
    color: var(--brand-secondary);
    max-width: 580px;
    line-height: 1.4;
  }
  .cta-button {
    display: inline-block;
    background: var(--brand-primary);
    color: #FFFFFF;
    font-family: var(--font-heading);
    font-size: 17px;
    font-weight: 700;
    padding: 14px 34px;
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-button);
    white-space: nowrap;
  }
</style>
</head>
<body>
  <div class="top-row">
    <img class="logo" src="{{logoUrl}}" alt="" onerror="this.style.display='none'">
    <div class="hook">{{hook}}</div>
  </div>
  <div class="headline">{{headline}}</div>
  <div class="accent-line"></div>
  <div class="body-text">{{body}}</div>
  <div class="bottom-row">
    <div class="subheadline">{{subheadline}}</div>
    <div class="cta-button">{{cta}}</div>
  </div>
</body>
</html>
