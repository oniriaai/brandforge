services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  ai-image-agent:
    build:
      context: ./ai-image-generator
      dockerfile: Dockerfile
    ports:
      - '4100:4100'
    env_file:
      - .env
    environment:
      PORT: 4100
      RENDER_OUTPUT_DIR: output
      AGENT_STATE_FILE: output/jobs-state.json
      DELIVERY_BASE_URL: http://localhost:4100
    volumes:
      - ./ai-image-generator:/app
      - rendered:/app/output

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '${BACKEND_PORT:-3000}:3000'
    env_file:
      - .env
    environment:
      AI_IMAGE_AGENT_URL: http://ai-image-agent:4100
    volumes:
      - ./backend/src:/app/src
      - ./templates:/app/templates
      - uploads:/app/uploads
      - rendered:/app/rendered
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-image-agent:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '5173:5173'
    env_file:
      - .env
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
  rendered:
