<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  :root {
    /* __DESIGN_TOKENS__ */
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    font-family: var(--font-body);
    background:
      radial-gradient(ellipse at 90% 90%, color-mix(in srgb, var(--brand-primary) 6%, transparent) 0%, transparent 50%),
      var(--brand-bg);
    color: var(--brand-text);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: calc(70px * var(--spacing-unit));
    position: relative;
  }
  .logo-watermark {
    position: absolute;
    bottom: calc(30px * var(--spacing-unit));
    right: calc(30px * var(--spacing-unit));
    width: 48px;
    height: 48px;
    object-fit: contain;
    opacity: 0.2;
  }
  .hook-pill {
    display: inline-block;
    background: var(--brand-primary);
    color: #FFFFFF;
    font-size: 16px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 3px;
    padding: 10px 24px;
    border-radius: var(--radius-md);
    margin-bottom: calc(32px * var(--spacing-unit));
    align-self: flex-start;
  }
  .card {
    background: #FFFFFF;
    border: var(--border-width) solid color-mix(in srgb, var(--brand-primary) 8%, transparent);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-card);
    padding: calc(50px * var(--spacing-unit));
    width: 100%;
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .headline {
    font-family: var(--font-heading);
    font-size: 52px;
    font-weight: 900;
    line-height: 1.08;
    color: var(--brand-primary);
    margin-bottom: calc(16px * var(--spacing-unit));
  }
  .subheadline {
    font-size: 26px;
    font-weight: 600;
    color: var(--brand-secondary);
    margin-bottom: calc(32px * var(--spacing-unit));
    line-height: 1.35;
  }
  .accent-bar {
    width: 100%;
    height: 5px;
    background: linear-gradient(90deg, var(--brand-primary), var(--brand-accent));
    border-radius: 3px;
    margin-bottom: calc(32px * var(--spacing-unit));
  }
  .body-text {
    font-size: 25px;
    line-height: 1.7;
    color: color-mix(in srgb, var(--brand-text) 75%, transparent);
    flex: 1;
  }
  .cta-section {
    text-align: center;
    margin-top: calc(32px * var(--spacing-unit));
    width: 100%;
  }
  .cta-button {
    display: inline-block;
    background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
    color: #FFFFFF;
    font-family: var(--font-heading);
    font-size: 26px;
    font-weight: 700;
    padding: 22px 60px;
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-button);
  }
</style>
</head>
<body>
  <img class="logo-watermark" src="{{logoUrl}}" alt="" onerror="this.style.display='none'">
  <div class="hook-pill">{{hook}}</div>
  <div class="card">
    <div class="headline">{{headline}}</div>
    <div class="subheadline">{{subheadline}}</div>
    <div class="accent-bar"></div>
    <div class="body-text">{{body}}</div>
  </div>
  <div class="cta-section">
    <div class="cta-button">{{cta}}</div>
  </div>
</body>
</html>
